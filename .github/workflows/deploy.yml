name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Build landing page
        run: bun x astro build
        working-directory: web

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload landing page
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /opt/cc-music/web/dist"
          scp -i ~/.ssh/deploy_key -r web-dist/. ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/cc-music/web/dist/

      - name: Deploy API to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e

            # Clone repo on first deploy, pull on subsequent
            if [ ! -d /opt/cc-music/.git ]; then
              git clone https://github.com/j-shelfwood/cc-music.git /opt/cc-music
            else
              git -C /opt/cc-music pull
            fi

            cd /opt/cc-music

            # Rebuild and restart (--no-cache ensures yt-dlp stays current)
            docker build -t cc-music . --quiet
            docker rm -f cc-music 2>/dev/null || true
            docker run -d \
              --name cc-music \
              --restart unless-stopped \
              -p 127.0.0.1:3001:8080 \
              cc-music

            sleep 2
            STATUS=\$(docker inspect --format='{{.State.Status}}' cc-music 2>/dev/null || echo 'missing')
            if [ \"\$STATUS\" != 'running' ]; then
              echo 'ERROR: container not running'
              docker logs cc-music 2>&1 | tail -20
              exit 1
            fi
            echo 'Deploy complete: https://cc-music.shelfwood.co'
          "
