name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: influx.shelfwood.co
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Clone repo on first deploy, pull on subsequent
            if [ ! -d /opt/cc-music ]; then
              git clone https://github.com/j-shelfwood/cc-music.git /opt/cc-music
            else
              git -C /opt/cc-music pull
            fi

            cd /opt/cc-music

            # Rebuild image and restart container
            docker compose build --no-cache
            docker compose up -d

            echo "Deploy complete"
