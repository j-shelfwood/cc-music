name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Build landing page
        run: bun x astro build
        working-directory: web

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload landing page
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /opt/cc-music/web/dist"
          scp -i ~/.ssh/deploy_key -r web-dist/. ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/cc-music/web/dist/

      - name: Deploy API to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e

            # Clone repo on first deploy, pull on subsequent
            if [ ! -d /opt/cc-music/.git ]; then
              git clone https://github.com/j-shelfwood/cc-music.git /opt/cc-music
            else
              git -C /opt/cc-music pull
            fi

            # PHP-FPM serves index.php directly from /opt/cc-music/server/ —
            # no restart needed after git pull, files are read per-request.
            # Verify php-fpm is healthy.
            systemctl is-active --quiet php8.1-fpm || { echo 'ERROR: php8.1-fpm not running'; journalctl -u php8.1-fpm -n 20 --no-pager; exit 1; }
            echo 'Deploy complete: https://cc-music.shelfwood.co'
          "
