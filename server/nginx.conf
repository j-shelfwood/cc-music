# Nginx config snippet — add inside your server {} block
# Adjust root and fastcgi_pass to match your setup

location / {
    # Disable nginx response buffering — required for audio streaming
    proxy_buffering off;
    fastcgi_buffering off;

    try_files $uri $uri/ /index.php?$query_string;
}

location ~ \.php$ {
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;  # adjust PHP-FPM socket path
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

    # No timeout — audio streams can run for 40+ minutes
    fastcgi_read_timeout 86400;
    proxy_read_timeout 86400;
}
